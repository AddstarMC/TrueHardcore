# HardCore Configuration

# Set true to enable debug mode
debugEnabled: false

# The hardcore world for this server
world: ""

# Set true to enable
gameEnabled: true

# The ChatControlRed channel name to broadcast messages
broadcastChannel: GamesBCast

# Boolean - set true to enable autosaving
AutoSaveEnabled: false

Database:
  # The ip or hostname of the database
  Host: localhost

  # The port of the database
  Port: '3306'

  # The Name of the database
  Name: hardcore

  # The Username of the database
  Username: username

  # The password of the database
  Password: password

Difficulty:
  # Set from 0 - 50 will make a chunk harder on initial load
  baseChunkTime: 0

# The lobby game world name
lobbyWorld: lobby

world-settings:
  # Greeting on World Entry
  greeting: Welcome to Hardcore

  # Time you are banned on death. Default 12hrs(43200s)
  banTime: 43200

  # Potential distance to look for random spawn
  spawnDistance: 5000

  # Time you are safe after respawing, Default 60sec
  spawnProtection: 60

  # A location: worldname,x,y,z,pitch,yaw
  exitPos: "lobby,0,0,0,0,-2"

  # The time before the world rolls back after death, Default 0 ticks
  rollbackdelay: 0

  # Does the player drop items on death
  deathdrops: true

  # How long to keep a chunk loaded after death. Default 5mins (300s)
  chunkHoldOnDeath: 300

  # This prevents a player quiting hardcore properly while in combat
  antiCombatLog: false

  # How long to consider players in combat mode, in seconds
  combatTime: 30

  # Does this world use the whitelist
  whitelisted: true

  # World difficulty: PEACEFUL, NORMAL, HARD
  difficulty: HARD

  # Command to be run on death. Can use <player> <displayname> <world> <score> <cause> %place_holders%
  deathcommand: ""

  # Command to be run when a player kills the Ender Dragon. Can use <player> <displayname> <world> <score> <cause> %place_holders%
  dragonkillcommand: ""

  # Command to be run when a player respawns the Ender Dragon. Can use <player> <displayname> <world> <score> <cause> %place_holders%
  dragonrespawncommand: ""

  # Command to be run when a player starts a new life. Can use <player> <displayname> <world> <score> <cause> %place_holders%
  newlifecommand: ""

  # Message to be sent to all players in the world when someone dies
  rollbackBroadcast: "&eYou now have %time% to raid &b%player%'s &estuff before it all disappears!"